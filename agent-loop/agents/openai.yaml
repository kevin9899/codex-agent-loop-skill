interface:
  display_name: "Agent Loop"
  short_description: "Use `$loop` for a strongest-model-pinned Codex workflow with local intake, research, staged planning, triple challenge, execution, and reassessment. Requires delegated `spawn_agent` support."
  default_prompt: "Use `$loop` or `$agent-loop` to accept a local path, markdown link, `file://` URL, or pasted note, then read the target contract first, normalize the source, resolve one concrete strongest-model hard pin for the live invocation, and keep every research, planning, challenge, execution, and verification lane on that exact pin. This skill is intended only for Codex runtimes that support delegated `spawn_agent` calls plus explicit `model` and `reasoning_effort` fields. In many current Codex runtimes this may resolve to `gpt-5.4` with `xhigh`, but the local runtime config and catalog remain authoritative unless the user explicitly overrides them before dispatch. Every delegated lane must pass that pair explicitly on the `spawn_agent` tool call through `model` and `reasoning_effort`; never rely on inherited defaults. Treat any lane output produced without that exact pin, or on a weaker model/effort pair, as inadmissible and rerun it. Then run research, build a staged plan, challenge it with three challengers, and either stop at the revised plan when the user wants planning-only or execute one bounded stage, verify with three fresh challengers, and close that stage by commit when applicable or by explicit rescope or escalate. Continue or stop only through later goal reassessment and run-decision steps. Treat the latest sealed handoff after fresh preflight as the only legal resume authority, and defer exact packet and handoff legality to the bundled design references."
