name: validate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate public release shape
        run: python scripts/validate_public_repo.py
      - name: Smoke-install skill directory
        run: python scripts/smoke_install.py
