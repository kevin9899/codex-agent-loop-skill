name: validate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate public release shape
        run: python scripts/validate_public_repo.py
      - name: Smoke-install skill directory
        run: python scripts/smoke_install.py
      - name: Verify public GitHub install coordinates
        run: python scripts/verify_public_install_paths.py
      - name: Verify Windows README path flow
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/verify_windows_readme.ps1
